# fly.toml app configuration file generated for lanvadip-bot on 2026-04-19T07:56:36+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lanvadip-bot'
primary_region = 'sin'

[build]

[env]
  DB_PATH = '/app/data/bot.db'
  ENV = 'production'
  PORT = ':8080'

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
